name: G4F Server Auto Renew

on:
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发
  # 如果需要定时执行，取消下面两行的注释，目前设定的是每天 0 点运行一次 (UTC时间)
  # schedule:
  #   - cron: '0 0 * * *'

jobs:
  renew_server:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖及系统组件
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage requests
          # 安装虚拟显示器 xvfb 以便在服务器无头环境下运行浏览器
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: 安装并配置 Cloudflare WARP CLI
        run: |
          # 导入 Cloudflare 官方 GPG key 并添加源
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          
          # 注册并启动 WARP (必须使用 --accept-tos 跳过许可确认)
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect
          
          # 等待连接建立并测试当前 IP
          sleep 5
          curl ifconfig.me
          echo " WARP 初始化完成"

      - name: 运行续期脚本
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # 使用 xvfb-run 运行脚本，提供虚拟显示环境
          xvfb-run -a python main.py
      name: G4F Server Auto Renew

